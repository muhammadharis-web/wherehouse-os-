services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fulfillment
      POSTGRES_USER: fulfillment
      POSTGRES_PASSWORD: fulfillment_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fulfillment"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://fulfillment:fulfillment_dev@postgres:5432/fulfillment
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-jwt-secret-change-in-prod
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/src

  celery-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: uv run celery -A fulfillment.tasks worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://fulfillment:fulfillment_dev@postgres:5432/fulfillment
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-jwt-secret-change-in-prod
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/src

  celery-beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: uv run celery -A fulfillment.tasks beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://fulfillment:fulfillment_dev@postgres:5432/fulfillment
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-jwt-secret-change-in-prod
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/src

volumes:
  pgdata:
